name: Auto-check Post-Deployment Checkbox

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  check-deployment-tasks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }}

      - name: Check for changes in specific folders
        id: check_changes
        run: |
          if git diff origin/${{ github.base_ref }}...HEAD --name-only | grep -E '^doc/'; then
            echo "needs_deployment=true" >> $GITHUB_OUTPUT
          else
            echo "needs_deployment=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Update PR body with checkbox
        if: steps.check_changes.outputs.needs_deployment == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            let body = pr.body;
            
            if (body && !body.includes('- [x] Is there anything to do post-deployment?')) {
              body = body.replace(
                '- [ ] Is there anything to do post-deployment?',
                '- [x] Is there anything to do post-deployment?'
              );
              
              github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                body: body
              });
            }
